name: CI - Cinema API

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/cinema-api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/cinema-api/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint || true

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test -- --passWithNoTests
