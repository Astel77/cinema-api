services:
  - type: web
    name: cinema-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DB_TYPE
        value: sqlite
      - key: DB_SQLITE_PATH
        value: cinema.sqlite
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: FRONTEND_URL
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: OPENWEATHER_DEFAULT_CITY
        value: Dakar
      - key: SEED_ADMIN_EMAIL
        value: admin@pathe-cinema.com
      - key: SEED_ADMIN_PASSWORD
        sync: false
